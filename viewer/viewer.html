<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Web Viewer</title>
  <link rel="stylesheet" href="viewer.css">
  <script type="module" src="../libs/model-viewer.min.js"></script>
</head>
<body>
  <!-- Loading state -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-cube-wrap">
      <div class="loading-cube">
        <div class="lc-face lc-front"></div>
        <div class="lc-face lc-back"></div>
        <div class="lc-face lc-left"></div>
        <div class="lc-face lc-right"></div>
        <div class="lc-face lc-top"></div>
        <div class="lc-face lc-bottom"></div>
      </div>
    </div>
    <p class="loading-text">Loading 3D model...</p>
  </div>

  <!-- 3D Viewer -->
  <model-viewer
    id="viewer"
    alt="3D Model generated by Hunyuan 3D"
    shadow-intensity="1"
    shadow-softness="0.8"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="30deg"
    environment-image="neutral"
    exposure="1"
    interaction-prompt="none"
    style="display: none;"
  >
    <div class="progress-bar" id="progressBar" slot="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </model-viewer>

  <!-- Fullscreen Controls (only in fullscreen mode) -->
  <div class="viewer-controls" id="viewerControls" style="display: none;">
    <div class="controls-left">
      <div class="viewer-badge">
        <span class="badge-3d">3D</span>
        <span class="badge-text">3D Web</span>
      </div>
    </div>
    <div class="controls-right">
      <button class="ctrl-btn" id="toggleRotate" title="Toggle auto-rotate">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M14.5 9a5.5 5.5 0 1 1-2-4.24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14.5 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="resetCamera" title="Reset camera">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="downloadGlb" title="Download GLB">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 3v8m0 0l-3-3m3 3l3-3M3 14v1h12v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Error state -->
  <div class="error-screen" id="errorScreen" style="display: none;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#ef4444" stroke-width="2"/>
      <line x1="15" y1="9" x2="9" y2="15" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <p class="error-text" id="errorText">Failed to load 3D model</p>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
