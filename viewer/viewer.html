<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Web Viewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <!-- Canvas container for Three.js -->
  <div id="canvasContainer"></div>

  <!-- Loading state -->
  <div class="loading-screen" id="loadingScreen">
    <svg class="fal-spinner" viewBox="0 0 624 624" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fillRule="evenodd" clipRule="evenodd" d="M402.365 0C413.17 0.000231771 421.824 8.79229 422.858 19.5596C432.087 115.528 508.461 191.904 604.442 201.124C615.198 202.161 624 210.821 624 221.638V402.362C624 413.179 615.198 421.839 604.442 422.876C508.461 432.096 432.087 508.472 422.858 604.44C421.824 615.208 413.17 624 402.365 624H221.635C210.83 624 202.176 615.208 201.142 604.44C191.913 508.472 115.538 432.096 19.5576 422.876C8.80183 421.839 0 413.179 0 402.362V221.638C0 210.821 8.80183 202.161 19.5576 201.124C115.538 191.904 191.913 115.528 201.142 19.5596C202.176 8.79215 210.83 0 221.635 0H402.365ZM312 124C208.17 124 124 208.17 124 312C124 415.83 208.17 500 312 500C415.83 500 500 415.83 500 312C500 208.17 415.83 124 312 124Z"/>
    </svg>
    <p class="loading-text">Loading 3D model...</p>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Fullscreen Controls -->
  <div class="viewer-controls" id="viewerControls" style="display: none;">
    <div class="controls-left">
      <div class="viewer-badge">
        <span class="badge-3d">3D</span>
        <span class="badge-text">3D Web</span>
      </div>
    </div>
    <div class="controls-right">
      <button class="ctrl-btn active" id="toggleRotate" title="Toggle auto-rotate (R)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M14.5 9a5.5 5.5 0 1 1-2-4.24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14.5 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="resetCamera" title="Reset camera (C)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="downloadGlb" title="Download GLB (D)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 3v8m0 0l-3-3m3 3l3-3M3 14v1h12v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Error state -->
  <div class="error-screen" id="errorScreen" style="display: none;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#ef4444" stroke-width="2"/>
      <line x1="15" y1="9" x2="9" y2="15" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <p class="error-text" id="errorText">Failed to load 3D model</p>
  </div>

  <script src="../libs/viewer.bundle.js"></script>
</body>
</html>
